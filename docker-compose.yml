services:

  portainer-mcp-http:
    image: ghcr.io/whitehara/portainer-mcp-http:${IMAGE_TAG:-latest}
    # For local builds, comment out image: above and uncomment build: below
    # build:
    #   context: ./portainer-mcp-http
    #   args:
    #     PORTAINER_MCP_VERSION: ${PORTAINER_MCP_VERSION:-v0.7.0}
    #     TARGETARCH: ${TARGETARCH:-amd64}
    container_name: portainer-mcp-http
    restart: unless-stopped
    command:
      - "--external-url=https://${PORTAINER_MCP_HOSTNAME}"
      - "--no-auto-tls"
      - "--listen=:80"
      - "--trusted-proxies=0.0.0.0/0"
      - "--data-path=/data"
      - "--oidc-client-id=${OIDC_CLIENT_ID}"
      - "--oidc-client-secret=${OIDC_CLIENT_SECRET}"
      - "--oidc-configuration-url=${OIDC_CONFIGURATION_URL}"
      - "--oidc-provider-name=Cloudflare Access"
      - "--oidc-allowed-users-glob=${OIDC_ALLOWED_USERS_GLOB:-}"
      - "--"
      - "/usr/local/bin/portainer-mcp"
      - "-server"
      - "${PORTAINER_HOST}:${PORTAINER_PORT:-9443}"
      - "-token"
      - "${PORTAINER_TOKEN}"
      - "-tools"
      - "/etc/portainer-mcp/tools.yaml"
      - "-disable-version-check"
    volumes:
      - portainer-mcp-http-tools:/etc/portainer-mcp
      - portainer-mcp-http-data:/data
    networks:
      - traefik-net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK}"
      - "traefik.http.routers.portainer-mcp-http.rule=Host(`${PORTAINER_MCP_HOSTNAME}`)"
      - "traefik.http.routers.portainer-mcp-http.entrypoints=${TRAEFIK_ENTRYPOINT:-http}"
      - "traefik.http.routers.portainer-mcp-http.middlewares=portainer-mcp-http-cors"
      - "traefik.http.services.portainer-mcp-http.loadbalancer.server.port=80"
      # CORS middleware: mcp-auth-proxy has no built-in CORS, so Traefik handles preflight.
      # Cloudflare AI controls dashboard (dash.cloudflare.com) performs browser fetch after OAuth.
      - "traefik.http.middlewares.portainer-mcp-http-cors.headers.accesscontrolalloworiginlist=https://dash.cloudflare.com"
      - "traefik.http.middlewares.portainer-mcp-http-cors.headers.accesscontrolallowmethods=GET,POST,OPTIONS,DELETE"
      - "traefik.http.middlewares.portainer-mcp-http-cors.headers.accesscontrolallowheaders=Authorization,Content-Type,Accept,Mcp-Session-Id,Mcp-Protocol-Version"
      - "traefik.http.middlewares.portainer-mcp-http-cors.headers.accesscontrolexposeheaders=Mcp-Session-Id"
      - "traefik.http.middlewares.portainer-mcp-http-cors.headers.accesscontrolmaxage=600"
      - "traefik.http.middlewares.portainer-mcp-http-cors.headers.addvaryheader=true"

volumes:
  portainer-mcp-http-tools:
  portainer-mcp-http-data:

networks:
  traefik-net:
    name: ${TRAEFIK_NETWORK}
    external: true
